<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c4dff"/>
      <stop offset="100%" style="stop-color:#5b2de0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>
  <!-- Music note (beamed eighth notes) -->
  <g fill="white">
    <!-- Note stems and beam -->
    <rect x="178" y="168" width="22" height="140" rx="8"/>
    <rect x="312" y="148" width="22" height="120" rx="8"/>
    <rect x="178" y="168" width="156" height="28" rx="8"/>
    <!-- Note heads -->
    <ellipse cx="196" cy="310" rx="36" ry="26" transform="rotate(-15 196 310)"/>
    <ellipse cx="330" cy="272" rx="36" ry="26" transform="rotate(-15 330 272)"/>
  </g>
</svg>
