<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Read the full announcement and leave a comment — Music Lab Academy." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Announcement — Music Lab Academy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>

    <div class="ml-app">
      <div id="navbar-container"></div>

      <main class="ml-main">
        <div class="ml-content" style="max-width:760px">

          <a href="/src/pages/announcements/announcements.html" class="ml-back-link">
            <i class="bi bi-arrow-left" aria-hidden="true"></i>Back to Announcements
          </a>

          <!-- Loading -->
          <div id="page-loading" class="d-flex justify-content-center align-items-center" style="min-height:200px;">
            <div class="spinner-border text-primary" role="status" style="width:1.75rem;height:1.75rem;border-width:.2em;">
              <span class="visually-hidden">Loading…</span>
            </div>
          </div>

          <!-- Content -->
          <article id="detail-content" class="d-none">

            <!-- Announcement body card -->
            <div class="card mb-4">
              <div id="ann-image-wrap" class="d-none">
                <img id="ann-image" src="" alt="" class="card-img-top"
                     style="max-height:340px;object-fit:cover;border-radius:14px 14px 0 0" />
              </div>
              <div class="card-body p-4">
                <div class="d-flex flex-wrap align-items-start justify-content-between gap-3 mb-3">
                  <div>
                    <div class="d-flex flex-wrap align-items-center gap-2 mb-1">
                      <h1 class="h4 fw-bold mb-0" id="ann-title" style="letter-spacing:-0.02em"></h1>
                      <span id="ann-audience-badge"></span>
                    </div>
                    <p class="text-muted small mb-0" id="ann-meta"></p>
                  </div>
                  <div id="admin-actions" class="d-none d-flex gap-2 flex-shrink-0">
                    <button id="btn-edit-ann" type="button" class="btn btn-sm btn-light"
                      data-bs-toggle="collapse" data-bs-target="#edit-announcement-collapse"
                      aria-expanded="false">
                      <i class="bi bi-pencil me-1" aria-hidden="true"></i>Edit
                    </button>
                    <button id="btn-delete-ann" type="button" class="btn btn-sm btn-light text-danger">
                      <i class="bi bi-trash me-1" aria-hidden="true"></i>Delete
                    </button>
                  </div>
                </div>

                <p id="ann-dates" class="text-muted small d-none mb-3">
                  <i class="bi bi-calendar-range me-1" aria-hidden="true"></i><span id="ann-dates-text"></span>
                </p>

                <div id="ann-body" class="text-body" style="white-space:pre-wrap;line-height:1.75;font-size:.9rem"></div>
              </div>
            </div>

            <!-- Edit form (Admin only) -->
            <div class="collapse mb-4" id="edit-announcement-collapse">
              <div class="ml-inline-form">
                <p class="ml-inline-form-title">Edit Announcement</p>
                <form id="edit-announcement-form" novalidate>
                  <input type="hidden" name="announcement_id" id="edit-announcement-id" />
                  <div class="row g-3">
                    <div class="col-12">
                      <label class="form-label">Title <span class="text-danger">*</span></label>
                      <input type="text" name="title" id="edit-title" class="form-control" required />
                      <div class="invalid-feedback">Title is required.</div>
                    </div>
                    <div class="col-12">
                      <label class="form-label">Body <span class="text-danger">*</span></label>
                      <textarea name="body" id="edit-body" class="form-control" rows="6" required></textarea>
                      <div class="invalid-feedback">Body is required.</div>
                    </div>
                    <div class="col-12">
                      <label class="form-label">Audience</label>
                      <select name="audience_type" class="form-select" id="edit-audience-type">
                        <option value="all_teachers">All Teachers</option>
                        <option value="selected_teachers">Selected Teachers…</option>
                      </select>
                    </div>
                    <div class="col-12 d-none" id="edit-teacher-picker">
                      <label class="form-label">Select Teachers <span class="text-danger">*</span></label>
                      <select name="target_teachers" id="edit-target-teachers" class="form-select" multiple size="5"></select>
                      <div class="form-text">Hold Ctrl / Cmd to select multiple.</div>
                    </div>
                    <div class="col-sm-6">
                      <label class="form-label">Starts at</label>
                      <input type="datetime-local" name="starts_at" id="edit-starts-at" class="form-control" />
                    </div>
                    <div class="col-sm-6">
                      <label class="form-label">Ends at</label>
                      <input type="datetime-local" name="ends_at" id="edit-ends-at" class="form-control" />
                    </div>
                    <div class="col-12">
                      <label class="form-label">Image URL</label>
                      <input type="url" name="image_url" id="edit-image-url" class="form-control" placeholder="https://…" />
                    </div>
                  </div>
                  <div id="edit-form-error" class="alert alert-danger mt-3 py-2 d-none" role="alert"></div>
                  <div class="d-flex gap-2 mt-3">
                    <button type="submit" id="btn-update-announcement" class="btn btn-primary">
                      <span id="btn-update-spinner" class="spinner-border spinner-border-sm me-1 d-none" aria-hidden="true"></span>
                      Save Changes
                    </button>
                    <button type="button" id="btn-cancel-edit" class="btn btn-light">Cancel</button>
                  </div>
                </form>
              </div>
            </div>

            <!-- Comments section -->
            <section class="card" aria-labelledby="comments-heading">
              <div class="card-body p-4">
                <h2 class="fw-semibold mb-3" id="comments-heading" style="font-size:1rem">
                  <i class="bi bi-chat-left-text me-2" aria-hidden="true"></i>Comments
                  <span class="badge rounded-pill bg-secondary ms-1 fw-normal"
                        id="comment-count-badge" style="font-size:.72rem"></span>
                </h2>

                <div id="comments-list" class="d-flex flex-column gap-3 mb-4" role="list"></div>

                <p id="comments-empty" class="text-muted small d-none mb-4">No comments yet. Be the first!</p>

                <form id="comment-form" novalidate>
                  <div class="mb-2">
                    <label for="comment-body" class="visually-hidden">Write a comment</label>
                    <textarea id="comment-body" name="body" class="form-control" rows="3"
                      placeholder="Write a comment…" required></textarea>
                    <div class="invalid-feedback">Comment cannot be empty.</div>
                  </div>
                  <button type="submit" id="btn-post-comment" class="btn btn-primary btn-sm">
                    <span id="btn-comment-spinner" class="spinner-border spinner-border-sm me-1 d-none" aria-hidden="true"></span>
                    <i class="bi bi-send me-1" aria-hidden="true"></i>Post
                  </button>
                </form>
              </div>
            </section>

          </article>

        </div>
      </main>
    </div>

    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script type="module" src="./announcement-detail.js"></script>
  </body>
</html>
