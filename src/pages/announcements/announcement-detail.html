<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Announcement — Music Lab</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <nav id="navbar-placeholder"></nav>

    <main class="container py-4" style="max-width: 760px;">
      <div id="announcement-detail">
        <!-- Announcement body rendered by announcement-detail.js -->
      </div>

      <hr />

      <h5 class="mb-3"><i class="bi bi-chat-left-text me-2"></i>Comments</h5>
      <div id="comments-list" class="mb-3">
        <!-- Comments rendered by announcement-detail.js -->
      </div>

      <form id="comment-form">
        <div class="mb-2">
          <textarea
            class="form-control"
            id="comment-body"
            rows="3"
            placeholder="Write a comment…"
            required
          ></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-sm">
          <i class="bi bi-send me-1"></i>Post comment
        </button>
      </form>
    </main>

    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmSXFaoSV9G0rB2r1JFZbRMvCLQ"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="./announcement-detail.js"></script>
  </body>
</html>
