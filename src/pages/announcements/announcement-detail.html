<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Announcement — Music Lab</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>

    <div class="ml-app">
      <div id="navbar-container"></div>

      <div class="ml-main">
        <div class="ml-content" style="max-width:760px">

          <!-- Back link -->
          <a href="/src/pages/announcements/announcements.html"
             class="d-inline-flex align-items-center gap-1 text-muted text-decoration-none mb-3"
             style="font-size:.875rem">
            <i class="bi bi-arrow-left"></i> Back to Announcements
          </a>

          <!-- Loading -->
          <div id="page-loading" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading…</span>
            </div>
          </div>

          <!-- Content -->
          <div id="detail-content" class="d-none">

            <!-- Announcement body card -->
            <div class="card border-0 shadow-sm mb-4">
              <div id="ann-image-wrap" class="d-none">
                <img id="ann-image" src="" alt="" class="card-img-top"
                     style="max-height:340px;object-fit:cover;border-radius:.5rem .5rem 0 0" />
              </div>
              <div class="card-body p-4">
                <div class="d-flex flex-wrap align-items-start justify-content-between gap-3 mb-3">
                  <div>
                    <div class="d-flex flex-wrap align-items-center gap-2 mb-1">
                      <h1 class="h4 fw-bold mb-0" id="ann-title"></h1>
                      <span id="ann-audience-badge"></span>
                    </div>
                    <p class="text-muted small mb-0" id="ann-meta"></p>
                  </div>
                  <!-- Admin actions -->
                  <div id="admin-actions" class="d-none d-flex gap-2 flex-shrink-0">
                    <button id="btn-edit-ann" type="button" class="btn btn-sm btn-light"
                      data-bs-toggle="collapse" data-bs-target="#edit-announcement-collapse">
                      <i class="bi bi-pencil me-1"></i>Edit
                    </button>
                    <button id="btn-delete-ann" type="button" class="btn btn-sm btn-light text-danger"
                      data-bs-toggle="modal" data-bs-target="#delete-announcement-modal">
                      <i class="bi bi-trash me-1"></i>Delete
                    </button>
                  </div>
                </div>

                <!-- Optional date range -->
                <p id="ann-dates" class="text-muted small d-none mb-3">
                  <i class="bi bi-calendar-range me-1"></i><span id="ann-dates-text"></span>
                </p>

                <!-- Body -->
                <div id="ann-body" class="text-body" style="white-space:pre-wrap;line-height:1.7"></div>
              </div>
            </div>

            <!-- Edit form (admin only, inline collapse) -->
            <div class="collapse mb-4" id="edit-announcement-collapse">
              <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                  <h6 class="fw-semibold mb-3">Edit Announcement</h6>
                  <form id="edit-announcement-form" novalidate>
                    <input type="hidden" name="announcement_id" id="edit-announcement-id" />
                    <div class="row g-3">
                      <div class="col-12">
                        <label class="form-label">Title <span class="text-danger">*</span></label>
                        <input type="text" name="title" id="edit-title" class="form-control" required />
                        <div class="invalid-feedback">Title is required.</div>
                      </div>
                      <div class="col-12">
                        <label class="form-label">Body <span class="text-danger">*</span></label>
                        <textarea name="body" id="edit-body" class="form-control" rows="6" required></textarea>
                        <div class="invalid-feedback">Body is required.</div>
                      </div>
                      <div class="col-12">
                        <label class="form-label">Audience</label>
                        <select name="audience_type" class="form-select" id="edit-audience-type">
                          <option value="all_teachers">All Teachers</option>
                          <option value="selected_teachers">Selected Teachers…</option>
                        </select>
                      </div>
                      <div class="col-12 d-none" id="edit-teacher-picker">
                        <label class="form-label">Select Teachers <span class="text-danger">*</span></label>
                        <select name="target_teachers" id="edit-target-teachers" class="form-select" multiple size="5"></select>
                        <div class="form-text">Hold Ctrl / Cmd to select multiple.</div>
                      </div>
                      <div class="col-sm-6">
                        <label class="form-label">Starts at</label>
                        <input type="datetime-local" name="starts_at" id="edit-starts-at" class="form-control" />
                      </div>
                      <div class="col-sm-6">
                        <label class="form-label">Ends at</label>
                        <input type="datetime-local" name="ends_at" id="edit-ends-at" class="form-control" />
                      </div>
                      <div class="col-12">
                        <label class="form-label">Image URL</label>
                        <input type="url" name="image_url" id="edit-image-url" class="form-control" placeholder="https://…" />
                      </div>
                    </div>
                    <div id="edit-form-error" class="alert alert-danger mt-3 py-2 d-none"></div>
                    <div class="d-flex gap-2 mt-3">
                      <button type="submit" id="btn-update-announcement" class="btn btn-primary">
                        <span id="btn-update-spinner" class="spinner-border spinner-border-sm me-1 d-none"></span>
                        Save Changes
                      </button>
                      <button type="button" id="btn-cancel-edit" class="btn btn-light">Cancel</button>
                    </div>
                  </form>
                </div>
              </div>
            </div>

            <!-- Comments section -->
            <div class="card border-0 shadow-sm">
              <div class="card-body p-4">
                <h5 class="fw-semibold mb-3">
                  <i class="bi bi-chat-left-text me-2"></i>Comments
                  <span class="badge rounded-pill bg-secondary-subtle text-secondary ms-1 fw-normal"
                        id="comment-count-badge" style="font-size:.75rem"></span>
                </h5>

                <!-- Comments list -->
                <div id="comments-list" class="d-flex flex-column gap-3 mb-4">
                  <!-- rendered by JS -->
                </div>

                <!-- Empty comments -->
                <p id="comments-empty" class="text-muted small d-none mb-4">No comments yet. Be the first!</p>

                <!-- Post comment form -->
                <form id="comment-form" novalidate>
                  <div class="mb-2">
                    <textarea id="comment-body" name="body" class="form-control" rows="3"
                      placeholder="Write a comment…" required></textarea>
                    <div class="invalid-feedback">Comment cannot be empty.</div>
                  </div>
                  <button type="submit" id="btn-post-comment" class="btn btn-primary btn-sm">
                    <span id="btn-comment-spinner" class="spinner-border spinner-border-sm me-1 d-none"></span>
                    <i class="bi bi-send me-1"></i>Post
                  </button>
                </form>
              </div>
            </div>

          </div><!-- /detail-content -->

        </div>
      </div>
    </div>

    <!-- Delete confirmation modal -->
    <div class="modal fade" id="delete-announcement-modal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header border-0">
            <h6 class="modal-title fw-semibold">Delete Announcement</h6>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            Are you sure you want to delete this announcement? This cannot be undone.
          </div>
          <div class="modal-footer border-0">
            <button type="button" class="btn btn-light btn-sm" data-bs-dismiss="modal">Cancel</button>
            <button type="button" id="btn-confirm-delete" class="btn btn-danger btn-sm">
              <span id="btn-delete-spinner" class="spinner-border spinner-border-sm me-1 d-none"></span>
              Delete
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script type="module" src="./announcement-detail.js"></script>
  </body>
</html>
