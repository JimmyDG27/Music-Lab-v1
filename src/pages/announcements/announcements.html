<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="School announcements for Music Lab Academy — view, post, and manage communications for all teachers." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Announcements — Music Lab Academy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>

    <div class="ml-app">
      <div id="navbar-container"></div>

      <main class="ml-main">
        <div class="ml-content">

          <!-- Page header -->
          <div class="ml-page-header">
            <div>
              <h1>Announcements</h1>
              <p class="ml-page-subtitle" id="announcements-subtitle"></p>
            </div>
            <button id="btn-new-announcement" type="button" class="btn btn-primary d-none"
              data-bs-toggle="collapse" data-bs-target="#create-announcement-collapse" aria-expanded="false">
              <i class="bi bi-megaphone me-1" aria-hidden="true"></i>New Announcement
            </button>
          </div>

          <!-- Create form (Admin only) -->
          <div class="collapse" id="create-announcement-collapse">
            <div class="ml-inline-form mb-4">
              <p class="ml-inline-form-title">New Announcement</p>
              <form id="create-announcement-form" novalidate>
                <div class="row g-3">
                  <div class="col-12">
                    <label class="form-label">Title <span class="text-danger">*</span></label>
                    <input type="text" name="title" class="form-control" required />
                    <div class="invalid-feedback">Title is required.</div>
                  </div>
                  <div class="col-12">
                    <label class="form-label">Body <span class="text-danger">*</span></label>
                    <textarea name="body" class="form-control" rows="5" required></textarea>
                    <div class="invalid-feedback">Body is required.</div>
                  </div>
                  <div class="col-12">
                    <label class="form-label">Audience</label>
                    <select name="audience_type" class="form-select" id="create-audience-type">
                      <option value="all_teachers">All Teachers</option>
                      <option value="selected_teachers">Selected Teachers…</option>
                    </select>
                  </div>
                  <div class="col-12 d-none" id="create-teacher-picker">
                    <label class="form-label">Select Teachers <span class="text-danger">*</span></label>
                    <select name="target_teachers" id="create-target-teachers" class="form-select" multiple size="5"></select>
                    <div class="form-text">Hold Ctrl / Cmd to select multiple.</div>
                  </div>
                  <div class="col-sm-6">
                    <label class="form-label">Starts at</label>
                    <input type="datetime-local" name="starts_at" class="form-control" />
                  </div>
                  <div class="col-sm-6">
                    <label class="form-label">Ends at</label>
                    <input type="datetime-local" name="ends_at" class="form-control" />
                  </div>
                  <div class="col-12">
                    <label class="form-label">Image URL</label>
                    <input type="url" name="image_url" class="form-control" placeholder="https://…" />
                  </div>
                </div>
                <div id="create-form-error" class="alert alert-danger mt-3 py-2 d-none" role="alert"></div>
                <div class="d-flex gap-2 mt-3">
                  <button type="submit" id="btn-create-announcement" class="btn btn-primary">
                    <span id="btn-create-spinner" class="spinner-border spinner-border-sm me-1 d-none" aria-hidden="true"></span>
                    Publish
                  </button>
                  <button type="button" id="btn-cancel-create" class="btn btn-light">Cancel</button>
                </div>
              </form>
            </div>
          </div>

          <!-- Edit form (Admin only) -->
          <div class="collapse" id="edit-announcement-collapse">
            <div class="ml-inline-form mb-4">
              <p class="ml-inline-form-title" id="edit-announcement-title">Edit Announcement</p>
              <form id="edit-announcement-form" novalidate>
                <input type="hidden" name="announcement_id" id="edit-announcement-id" />
                <div class="row g-3">
                  <div class="col-12">
                    <label class="form-label">Title <span class="text-danger">*</span></label>
                    <input type="text" name="title" id="edit-title" class="form-control" required />
                    <div class="invalid-feedback">Title is required.</div>
                  </div>
                  <div class="col-12">
                    <label class="form-label">Body <span class="text-danger">*</span></label>
                    <textarea name="body" id="edit-body" class="form-control" rows="5" required></textarea>
                    <div class="invalid-feedback">Body is required.</div>
                  </div>
                  <div class="col-12">
                    <label class="form-label">Audience</label>
                    <select name="audience_type" class="form-select" id="edit-audience-type">
                      <option value="all_teachers">All Teachers</option>
                      <option value="selected_teachers">Selected Teachers…</option>
                    </select>
                  </div>
                  <div class="col-12 d-none" id="edit-teacher-picker">
                    <label class="form-label">Select Teachers <span class="text-danger">*</span></label>
                    <select name="target_teachers" id="edit-target-teachers" class="form-select" multiple size="5"></select>
                    <div class="form-text">Hold Ctrl / Cmd to select multiple.</div>
                  </div>
                  <div class="col-sm-6">
                    <label class="form-label">Starts at</label>
                    <input type="datetime-local" name="starts_at" id="edit-starts-at" class="form-control" />
                  </div>
                  <div class="col-sm-6">
                    <label class="form-label">Ends at</label>
                    <input type="datetime-local" name="ends_at" id="edit-ends-at" class="form-control" />
                  </div>
                  <div class="col-12">
                    <label class="form-label">Image URL</label>
                    <input type="url" name="image_url" id="edit-image-url" class="form-control" placeholder="https://…" />
                  </div>
                </div>
                <div id="edit-form-error" class="alert alert-danger mt-3 py-2 d-none" role="alert"></div>
                <div class="d-flex gap-2 mt-3">
                  <button type="submit" id="btn-update-announcement" class="btn btn-primary">
                    <span id="btn-update-spinner" class="spinner-border spinner-border-sm me-1 d-none" aria-hidden="true"></span>
                    Save Changes
                  </button>
                  <button type="button" id="btn-cancel-edit-announcement" class="btn btn-light">Cancel</button>
                </div>
              </form>
            </div>
          </div>

          <!-- Search toolbar -->
          <div id="search-bar" class="ml-toolbar">
            <div class="ml-search-wrap">
              <i class="bi bi-search ml-search-icon" aria-hidden="true"></i>
              <input id="search-input" type="search" class="form-control"
                placeholder="Search announcements…" aria-label="Search announcements" />
            </div>
          </div>

          <!-- Loading -->
          <div id="page-loading" class="d-flex justify-content-center align-items-center" style="min-height:200px;">
            <div class="spinner-border text-primary" role="status" style="width:1.75rem;height:1.75rem;border-width:.2em;">
              <span class="visually-hidden">Loading…</span>
            </div>
          </div>

          <!-- Content -->
          <div id="announcements-content" class="d-none">

            <div id="empty-state" class="d-none ml-empty-state">
              <div class="ml-empty-icon" aria-hidden="true">
                <i class="bi bi-megaphone"></i>
              </div>
              <p class="ml-empty-title">No announcements yet</p>
              <p class="ml-empty-desc">Announcements posted here will be visible to all teachers.</p>
            </div>

            <div id="announcements-list" class="d-flex flex-column gap-3"></div>

          </div>

        </div>
      </main>
    </div>

    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script type="module" src="./announcements.js"></script>
  </body>
</html>
