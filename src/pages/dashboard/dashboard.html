<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — Music Lab</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>

    <!-- App shell: sidebar container + main area -->
    <div class="ml-app">

      <!-- Sidebar injected here by navbar.js -->
      <div id="navbar-container"></div>

      <!-- Main content -->
      <div class="ml-main">
        <div class="ml-content">

          <!-- Loading spinner -->
          <div id="page-loading" class="d-flex justify-content-center mt-5">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading…</span>
            </div>
          </div>

          <!-- Dashboard rendered by dashboard.js -->
          <div id="dashboard-content" class="d-none"></div>

        </div>
      </div>
    </div>

    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="./dashboard.js"></script>
  </body>
</html>
