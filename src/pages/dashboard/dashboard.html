<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Music Lab Academy dashboard — view your key stats and quick links to students, teachers, and announcements." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Dashboard — Music Lab Academy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>

    <div class="ml-app">

      <div id="navbar-container"></div>

      <main class="ml-main">
        <div class="ml-content">

          <div id="page-loading" class="d-flex justify-content-center align-items-center" style="min-height: 200px;">
            <div class="spinner-border text-primary" role="status" style="width:1.75rem;height:1.75rem;border-width:.2em;">
              <span class="visually-hidden">Loading…</span>
            </div>
          </div>

          <div id="dashboard-content" class="d-none"></div>

        </div>
      </main>
    </div>

    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <!-- Lessons per student monthly breakdown modal (teacher) -->
    <div class="modal fade" id="student-lessons-modal" tabindex="-1" aria-labelledby="student-lessons-modal-label" aria-hidden="true">
      <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <div>
              <h5 class="modal-title" id="student-lessons-modal-label">
                <i class="bi bi-calendar3 me-1" style="color:var(--brand-600)"></i>
                My Lessons by Student
              </h5>
              <p class="mb-0 mt-1" style="font-size:.78rem;color:var(--text-400)">
                Lessons per student per calendar month
              </p>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-0">
            <div id="student-lessons-modal-body">
              <div class="d-flex justify-content-center align-items-center py-5">
                <div class="spinner-border text-primary" role="status" style="width:1.5rem;height:1.5rem;border-width:.18em">
                  <span class="visually-hidden">Loading…</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Lessons monthly breakdown modal (admin) -->
    <div class="modal fade" id="lessons-modal" tabindex="-1" aria-labelledby="lessons-modal-label" aria-hidden="true">
      <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <div>
              <h5 class="modal-title" id="lessons-modal-label">
                <i class="bi bi-calendar3 me-1" style="color:var(--brand-600)"></i>
                Lesson Activity — All Teachers
              </h5>
              <p class="mb-0 mt-1" style="font-size:.78rem;color:var(--text-400)">
                Lessons per calendar month since records began
              </p>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-0">
            <div id="lessons-modal-body">
              <div class="d-flex justify-content-center align-items-center py-5">
                <div class="spinner-border text-primary" role="status" style="width:1.5rem;height:1.5rem;border-width:.18em">
                  <span class="visually-hidden">Loading…</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script type="module" src="./dashboard.js"></script>
  </body>
</html>
