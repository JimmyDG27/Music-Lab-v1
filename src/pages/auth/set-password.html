<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set Password — Music Lab</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body class="bg-light">

    <div class="d-flex justify-content-center align-items-center vh-100">
      <div class="card p-4 shadow-sm" style="width:100%;max-width:420px">

        <div class="text-center mb-4">
          <div class="mb-2" style="font-size:2rem;color:#4361ee">
            <i class="bi bi-music-note-beamed"></i>
          </div>
          <h4 class="fw-bold mb-0">Music Lab</h4>
          <p class="text-muted small mt-1">Welcome! Set your password to get started.</p>
        </div>

        <!-- Spinner while exchanging token -->
        <div id="token-loading" class="text-center py-3">
          <div class="spinner-border text-primary spinner-border-sm" role="status"></div>
          <p class="text-muted small mt-2 mb-0">Verifying invite link…</p>
        </div>

        <!-- Error state (invalid / expired link) -->
        <div id="token-error" class="d-none">
          <div class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-triangle me-2"></i>
            <span id="token-error-msg">This invite link is invalid or has expired.</span>
          </div>
          <a href="/src/pages/login/login.html" class="btn btn-light w-100">Back to Login</a>
        </div>

        <!-- Set password form -->
        <form id="set-password-form" class="d-none" novalidate>
          <div class="mb-3">
            <label class="form-label" for="new-password">New Password</label>
            <input type="password" id="new-password" name="password"
              class="form-control" minlength="8" required
              autocomplete="new-password" />
            <div class="invalid-feedback">Password must be at least 8 characters.</div>
          </div>
          <div class="mb-4">
            <label class="form-label" for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" name="confirm"
              class="form-control" required
              autocomplete="new-password" />
            <div class="invalid-feedback" id="confirm-feedback">Passwords must match.</div>
          </div>

          <div id="set-pw-error" class="alert alert-danger py-2 d-none mb-3"></div>

          <button type="submit" id="btn-set-password" class="btn btn-primary w-100">
            <span id="btn-set-spinner" class="spinner-border spinner-border-sm me-1 d-none"></span>
            <i class="bi bi-key me-1"></i>Set Password & Sign In
          </button>
        </form>

      </div>
    </div>

    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script type="module" src="./set-password.js"></script>
  </body>
</html>
