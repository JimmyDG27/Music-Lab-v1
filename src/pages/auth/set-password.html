<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Задай парола и активирай своя акаунт в Music Lab Academy." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Задай Парола — Music Lab Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --brand-900: #312e81;
        --brand-700: #4338ca;
        --brand-600: #4f46e5;
        --amber-400: #a78bfa;
        --surface:   #f4f4fd;
        --text-900:  #1a1829;
        --text-600:  #4b4870;
        --text-400:  #8b89a8;
        --border:    #ddddf0;
        --sh-lg:     0 8px 28px rgba(26,24,50,0.11), 0 3px 10px rgba(26,24,50,0.06);
      }

      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: var(--surface);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
        color: var(--text-900);
        -webkit-font-smoothing: antialiased;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        text-decoration: none;
        color: var(--text-900);
        font-weight: 700;
        font-size: 1.05rem;
        letter-spacing: -0.02em;
        margin-bottom: 2rem;
        transition: opacity 0.15s;
      }
      .brand:hover { opacity: 0.8; }

      .brand-icon {
        width: 38px; height: 38px;
        background: var(--brand-900);
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        font-size: 1rem;
        color: var(--amber-400);
        flex-shrink: 0;
      }

      .login-card {
        width: 100%;
        max-width: 420px;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 2.5rem 2rem;
        box-shadow: var(--sh-lg);
      }

      .login-card h1 {
        font-size: 1.55rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        margin-bottom: 0.35rem;
        line-height: 1.2;
      }

      .login-card .subtitle {
        color: var(--text-600);
        font-size: 0.88rem;
        margin-bottom: 1.75rem;
      }

      .form-label {
        display: block;
        font-size: 0.82rem;
        font-weight: 500;
        color: var(--text-600);
        margin-bottom: 0.4rem;
      }

      .form-control {
        width: 100%;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text-900);
        padding: 0.65rem 0.9rem;
        font-size: 0.88rem;
        font-family: inherit;
        transition: border-color 0.15s, box-shadow 0.15s;
        outline: none;
        display: block;
      }

      .form-control::placeholder { color: var(--text-400); }

      .form-control:focus {
        border-color: var(--brand-600);
        box-shadow: 0 0 0 3px rgba(79,70,229,0.13);
      }

      .form-control.is-invalid { border-color: #dc2626; }

      .invalid-feedback {
        display: none;
        color: #dc2626;
        font-size: 0.77rem;
        margin-top: 0.3rem;
      }

      .was-validated .form-control:invalid ~ .invalid-feedback,
      .form-control.is-invalid ~ .invalid-feedback { display: block; }

      .btn-set {
        width: 100%;
        background: var(--brand-700);
        border: none;
        border-radius: 8px;
        color: #fff;
        font-weight: 600;
        font-size: 0.9rem;
        font-family: inherit;
        padding: 0.72rem;
        cursor: pointer;
        transition: background 0.15s, box-shadow 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-top: 1.5rem;
        letter-spacing: -0.01em;
      }

      .btn-set:hover:not(:disabled) {
        background: var(--brand-900);
        box-shadow: 0 4px 14px rgba(15,36,25,0.28);
      }

      .btn-set:disabled { opacity: 0.6; cursor: not-allowed; }

      /* Token states */
      #token-loading {
        text-align: center;
        padding: 1.5rem 0;
      }

      #token-loading p {
        color: var(--text-600);
        font-size: 0.88rem;
        margin-top: 0.75rem;
      }

      #token-error .token-error-box {
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 8px;
        color: #b91c1c;
        font-size: 0.86rem;
        padding: 0.75rem 1rem;
        margin-bottom: 1.25rem;
        display: flex;
        align-items: flex-start;
        gap: 0.5rem;
      }

      .btn-back-login {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text-900);
        font-weight: 600;
        font-size: 0.88rem;
        font-family: inherit;
        padding: 0.72rem;
        cursor: pointer;
        transition: background 0.15s;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }

      .btn-back-login:hover {
        background: var(--border);
        color: var(--text-900);
      }

      #set-pw-error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 8px;
        color: #b91c1c;
        font-size: 0.84rem;
        padding: 0.7rem 0.9rem;
        margin-top: 1rem;
      }

      .back-link {
        margin-top: 1.5rem;
        font-size: 0.82rem;
        color: var(--text-600);
      }

      .back-link a {
        color: var(--brand-700);
        text-decoration: none;
        font-weight: 500;
      }

      .back-link a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>

    <a href="/" class="brand" aria-label="Music Lab Academy">
      <div class="brand-icon" aria-hidden="true">
        <i class="bi bi-music-note-beamed"></i>
      </div>
      Music Lab Academy
    </a>

    <main>
      <div class="login-card">
        <h1>Добре дошъл!</h1>
        <p class="subtitle">Задай парола, за да активираш своя акаунт.</p>

        <div id="token-loading">
          <div class="spinner-border spinner-border-sm text-secondary" role="status" aria-label="Зарежда се…"></div>
          <p>Проверяване на покана…</p>
        </div>

        <div id="token-error" class="d-none">
          <div class="token-error-box" role="alert">
            <i class="bi bi-exclamation-circle" aria-hidden="true"></i>
            <span id="token-error-msg">Линкът е невалиден или е изтекъл.</span>
          </div>
          <a href="/src/pages/login/login.html" class="btn-back-login">
            <i class="bi bi-arrow-left" aria-hidden="true"></i>Обратно към вход
          </a>
        </div>

        <form id="set-password-form" class="d-none" novalidate>
          <div class="mb-3">
            <label class="form-label" for="new-password">Нова парола</label>
            <input type="password" id="new-password" name="password"
              class="form-control" minlength="8" required
              autocomplete="new-password" placeholder="Мин. 8 символа" />
            <div class="invalid-feedback">Паролата трябва да е поне 8 символа.</div>
          </div>
          <div class="mb-2">
            <label class="form-label" for="confirm-password">Потвърди паролата</label>
            <input type="password" id="confirm-password" name="confirm"
              class="form-control" required
              autocomplete="new-password" placeholder="••••••••" />
            <div class="invalid-feedback" id="confirm-feedback">Паролите не съвпадат.</div>
          </div>

          <div id="set-pw-error" class="d-none" role="alert"></div>

          <button type="submit" id="btn-set-password" class="btn-set">
            <span id="btn-set-spinner" class="spinner-border spinner-border-sm d-none" aria-hidden="true"></span>
            <i class="bi bi-key" aria-hidden="true"></i>
            Задай парола и влез
          </button>
        </form>
      </div>
    </main>

    <p class="back-link">
      <a href="/"><i class="bi bi-arrow-left me-1" aria-hidden="true"></i>Обратно към началната страница</a>
    </p>

    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script type="module" src="./set-password.js"></script>
  </body>
</html>
