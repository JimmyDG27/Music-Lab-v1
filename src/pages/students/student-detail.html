<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Student profile — view lessons, songs, recordings, notes, and contact information." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Student — Music Lab Academy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>

    <div class="ml-app">
      <div id="navbar-container"></div>

      <main class="ml-main">
        <div class="ml-content">

          <!-- Loading -->
          <div id="page-loading" class="d-flex justify-content-center align-items-center" style="min-height:200px;">
            <div class="spinner-border text-primary" role="status" style="width:1.75rem;height:1.75rem;border-width:.2em;">
              <span class="visually-hidden">Loading…</span>
            </div>
          </div>

          <!-- Student content -->
          <div id="student-content" class="d-none">

            <a href="/src/pages/students/students.html" class="ml-back-link">
              <i class="bi bi-arrow-left" aria-hidden="true"></i>All Students
            </a>

            <div id="student-header" class="mb-4"></div>

            <!-- Tabs -->
            <ul class="nav nav-tabs mb-0" role="tablist" aria-label="Student sections">
              <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="tab"
                  data-bs-target="#panel-lessons" type="button" role="tab"
                  aria-controls="panel-lessons">
                  <i class="bi bi-journal-check me-1" aria-hidden="true"></i>Lessons</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="tab"
                  data-bs-target="#panel-songs" type="button" role="tab"
                  aria-controls="panel-songs">
                  <i class="bi bi-music-note-beamed me-1" aria-hidden="true"></i>Songs</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="tab"
                  data-bs-target="#panel-recordings" type="button" role="tab"
                  aria-controls="panel-recordings">
                  <i class="bi bi-mic me-1" aria-hidden="true"></i>Recordings</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="tab"
                  data-bs-target="#panel-notes" type="button" role="tab"
                  aria-controls="panel-notes">
                  <i class="bi bi-chat-left-text me-1" aria-hidden="true"></i>Notes</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="tab"
                  data-bs-target="#panel-overview" type="button" role="tab"
                  aria-controls="panel-overview">
                  <i class="bi bi-person-lines-fill me-1" aria-hidden="true"></i>Info</button>
              </li>
            </ul>

            <div class="tab-content border border-top-0 rounded-bottom p-4 bg-white">
              <div class="tab-pane fade" id="panel-lessons"    role="tabpanel"></div>
              <div class="tab-pane fade" id="panel-songs"      role="tabpanel"></div>
              <div class="tab-pane fade" id="panel-recordings" role="tabpanel"></div>
              <div class="tab-pane fade" id="panel-notes"      role="tabpanel"></div>
              <div class="tab-pane fade" id="panel-overview"   role="tabpanel"></div>
            </div>

            <!-- Restore saved tab before Bootstrap JS -->
            <script>
              (function () {
                var sid    = new URLSearchParams(location.search).get('id');
                var target = (sid && sessionStorage.getItem('student-tab:' + sid)) || '#panel-lessons';
                var btn    = document.querySelector('[data-bs-target="' + target + '"]');
                var pane   = document.querySelector(target);
                if (btn)  btn.classList.add('active');
                if (pane) pane.classList.add('show', 'active');
              })();
            </script>

          </div>

          <!-- Error state -->
          <div id="error-state" class="d-none ml-empty-state">
            <div class="ml-empty-icon" aria-hidden="true">
              <i class="bi bi-exclamation-circle text-danger" style="color:#dc2626!important"></i>
            </div>
            <p class="ml-empty-title" id="error-message">Student not found.</p>
            <a href="/src/pages/students/students.html" class="btn btn-light btn-sm mt-2">Back to Students</a>
          </div>

        </div>
      </main>
    </div>

    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script type="module" src="./student-detail.js"></script>
  </body>
</html>
