<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student — Music Lab</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>

    <div class="ml-app">
      <div id="navbar-container"></div>

      <div class="ml-main">
        <div class="ml-content">

          <!-- Loading -->
          <div id="page-loading" class="d-flex justify-content-center mt-5">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading…</span>
            </div>
          </div>

          <!-- Student content -->
          <div id="student-content" class="d-none">

            <!-- Back link -->
            <div class="mb-3">
              <a href="/src/pages/students/students.html"
                class="text-muted text-decoration-none small">
                <i class="bi bi-arrow-left me-1"></i>All Students
              </a>
            </div>

            <!-- Header -->
            <div id="student-header" class="mb-4"></div>

            <!-- Tabs -->
            <ul class="nav nav-tabs mb-0" role="tablist">
              <li class="nav-item" role="presentation">
                <button class="nav-link active" data-bs-toggle="tab"
                  data-bs-target="#panel-overview" type="button" role="tab">Overview</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="tab"
                  data-bs-target="#panel-lessons" type="button" role="tab">Lessons</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="tab"
                  data-bs-target="#panel-songs" type="button" role="tab">Songs</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="tab"
                  data-bs-target="#panel-recordings" type="button" role="tab">Recordings</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="tab"
                  data-bs-target="#panel-notes" type="button" role="tab">Notes</button>
              </li>
            </ul>

            <div class="tab-content border border-top-0 rounded-bottom p-4 bg-white">
              <div class="tab-pane fade show active" id="panel-overview"   role="tabpanel"></div>
              <div class="tab-pane fade"             id="panel-lessons"    role="tabpanel"></div>
              <div class="tab-pane fade"             id="panel-songs"      role="tabpanel"></div>
              <div class="tab-pane fade"             id="panel-recordings" role="tabpanel"></div>
              <div class="tab-pane fade"             id="panel-notes"      role="tabpanel"></div>
            </div>

          </div>

          <!-- Error state -->
          <div id="error-state" class="d-none text-center py-5">
            <i class="bi bi-exclamation-circle fs-1 text-danger opacity-50"></i>
            <p class="text-muted mt-3" id="error-message">Student not found.</p>
            <a href="/src/pages/students/students.html"
              class="btn btn-outline-secondary btn-sm">Back to Students</a>
          </div>

        </div>
      </div>
    </div>

    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"></script>
    <script type="module" src="./student-detail.js"></script>
  </body>
</html>
