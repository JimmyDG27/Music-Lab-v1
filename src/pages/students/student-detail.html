<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student — Music Lab</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <nav id="navbar-placeholder"></nav>

    <main class="container py-4">
      <!-- Student header -->
      <div id="student-header" class="mb-4">
        <!-- Populated by student-detail.js -->
      </div>

      <!-- Tabs: Overview | Lessons | Songs | Recordings | Notes -->
      <ul class="nav nav-tabs mb-3" id="student-tabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="tab-overview"   data-bs-toggle="tab" data-bs-target="#panel-overview"   type="button" role="tab">Overview</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link"        id="tab-lessons"    data-bs-toggle="tab" data-bs-target="#panel-lessons"    type="button" role="tab">Lessons</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link"        id="tab-songs"      data-bs-toggle="tab" data-bs-target="#panel-songs"      type="button" role="tab">Songs</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link"        id="tab-recordings" data-bs-toggle="tab" data-bs-target="#panel-recordings" type="button" role="tab">Recordings</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link"        id="tab-notes"      data-bs-toggle="tab" data-bs-target="#panel-notes"      type="button" role="tab">Notes</button>
        </li>
      </ul>

      <div class="tab-content" id="student-tab-content">
        <div class="tab-pane fade show active" id="panel-overview"   role="tabpanel"></div>
        <div class="tab-pane fade"             id="panel-lessons"    role="tabpanel"></div>
        <div class="tab-pane fade"             id="panel-songs"      role="tabpanel"></div>
        <div class="tab-pane fade"             id="panel-recordings" role="tabpanel"></div>
        <div class="tab-pane fade"             id="panel-notes"      role="tabpanel"></div>
      </div>
    </main>

    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmSXFaoSV9G0rB2r1JFZbRMvCLQ"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="./student-detail.js"></script>
  </body>
</html>
