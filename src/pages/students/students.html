<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Students — Music Lab</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>

    <div class="ml-app">
      <div id="navbar-container"></div>

      <div class="ml-main">
        <div class="ml-content">

          <!-- Page header -->
          <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
            <div>
              <h1 class="h3 fw-bold mb-0">Students</h1>
              <p class="text-muted small mb-0" id="students-subtitle"></p>
            </div>
            <button id="btn-add-student" type="button" class="btn btn-primary d-none"
              data-bs-toggle="modal" data-bs-target="#addStudentModal">
              <i class="bi bi-plus-lg me-1"></i>Add Student
            </button>
          </div>

          <!-- Search + Sort -->
          <div class="d-flex flex-wrap gap-2 mb-3 align-items-center">
            <div style="max-width:300px;min-width:200px;flex:1">
              <div class="input-group">
                <span class="input-group-text bg-white border-end-0">
                  <i class="bi bi-search text-secondary"></i>
                </span>
                <input type="text" id="search-input" class="form-control border-start-0 ps-0"
                  placeholder="Search by name…" />
              </div>
            </div>
            <!-- Sort dropdown — shown for Admin only via JS -->
            <div id="sort-wrapper" class="d-none">
              <select id="sort-select" class="form-select" style="min-width:160px">
                <option value="az">A → Z</option>
                <option value="za">Z → A</option>
                <option value="newest">Latest Added</option>
              </select>
            </div>
          </div>

          <!-- Loading -->
          <div id="page-loading" class="d-flex justify-content-center mt-5">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading…</span>
            </div>
          </div>

          <!-- Content -->
          <div id="students-content" class="d-none">
            <div class="card">
              <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                  <thead>
                    <tr>
                      <th>Name</th>
                      <th class="d-none d-md-table-cell">Primary Teacher</th>
                      <th class="d-none d-sm-table-cell">Last Lesson</th>
                      <th>Status</th>
                      <th style="width:48px"></th>
                    </tr>
                  </thead>
                  <tbody id="students-tbody"></tbody>
                </table>
              </div>
            </div>

            <!-- Empty state -->
            <div id="empty-state" class="d-none text-center py-5">
              <i class="bi bi-people fs-1 text-secondary opacity-50"></i>
              <p class="text-muted mt-3 mb-0">No students found.</p>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- Add Student Modal (Admin only) -->
    <div class="modal fade" id="addStudentModal" tabindex="-1"
      aria-labelledby="addStudentModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header border-0 pb-0">
            <h5 class="modal-title fw-bold" id="addStudentModalLabel">Add Student</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <form id="add-student-form" novalidate>
            <div class="modal-body">
              <div class="row g-3">
                <div class="col-6">
                  <label class="form-label fw-semibold">First Name <span class="text-danger">*</span></label>
                  <input type="text" name="first_name" class="form-control" required />
                  <div class="invalid-feedback">Required.</div>
                </div>
                <div class="col-6">
                  <label class="form-label fw-semibold">Last Name <span class="text-danger">*</span></label>
                  <input type="text" name="last_name" class="form-control" required />
                  <div class="invalid-feedback">Required.</div>
                </div>
                <div class="col-6">
                  <label class="form-label fw-semibold">Phone</label>
                  <input type="tel" name="phone" class="form-control" />
                </div>
                <div class="col-6">
                  <label class="form-label fw-semibold">Email</label>
                  <input type="email" name="email" class="form-control" />
                </div>
                <div class="col-6">
                  <label class="form-label fw-semibold">Date of Birth</label>
                  <input type="date" name="birth_date" class="form-control" />
                </div>
                <div class="col-6">
                  <label class="form-label fw-semibold">Primary Teacher</label>
                  <select name="primary_teacher_id" id="teacher-select" class="form-select">
                    <option value="">— None —</option>
                  </select>
                </div>
              </div>
              <div id="form-error" class="alert alert-danger mt-3 d-none"></div>
            </div>
            <div class="modal-footer border-0 pt-0">
              <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" id="btn-save-student" class="btn btn-primary">
                <span id="btn-save-spinner" class="spinner-border spinner-border-sm me-1 d-none" role="status"></span>
                Save Student
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Edit Student Modal (Admin only) -->
    <div class="modal fade" id="editStudentModal" tabindex="-1"
      aria-labelledby="editStudentModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header border-0 pb-0">
            <h5 class="modal-title fw-bold" id="editStudentModalLabel">Edit Student</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <form id="edit-student-form" novalidate>
            <input type="hidden" name="student_id" id="edit-student-id" />
            <div class="modal-body">
              <div class="row g-3">
                <div class="col-6">
                  <label class="form-label fw-semibold">First Name <span class="text-danger">*</span></label>
                  <input type="text" name="first_name" id="edit-first-name" class="form-control" required />
                  <div class="invalid-feedback">Required.</div>
                </div>
                <div class="col-6">
                  <label class="form-label fw-semibold">Last Name <span class="text-danger">*</span></label>
                  <input type="text" name="last_name" id="edit-last-name" class="form-control" required />
                  <div class="invalid-feedback">Required.</div>
                </div>
                <div class="col-6">
                  <label class="form-label fw-semibold">Phone</label>
                  <input type="tel" name="phone" id="edit-phone" class="form-control" />
                </div>
                <div class="col-6">
                  <label class="form-label fw-semibold">Email</label>
                  <input type="email" name="email" id="edit-email" class="form-control" />
                </div>
                <div class="col-6">
                  <label class="form-label fw-semibold">Date of Birth</label>
                  <input type="date" name="birth_date" id="edit-birth-date" class="form-control" />
                </div>
                <div class="col-6">
                  <label class="form-label fw-semibold">Status</label>
                  <select name="is_active" id="edit-is-active" class="form-select">
                    <option value="true">Active</option>
                    <option value="false">Inactive</option>
                  </select>
                </div>
                <div class="col-12">
                  <label class="form-label fw-semibold">Primary Teacher</label>
                  <select name="primary_teacher_id" id="edit-teacher-select" class="form-select">
                    <option value="">— None —</option>
                  </select>
                </div>
              </div>
              <input type="hidden" id="edit-original-teacher" name="original_teacher_id" />
              <div id="edit-form-error" class="alert alert-danger mt-3 d-none"></div>
            </div>
            <div class="modal-footer border-0 pt-0">
              <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" id="btn-update-student" class="btn btn-primary">
                <span id="btn-update-spinner" class="spinner-border spinner-border-sm me-1 d-none" role="status"></span>
                Save Changes
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Deactivate / Reactivate Confirmation Modal (Admin only) -->
    <div class="modal fade" id="confirmStatusModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-sm">
        <div class="modal-content">
          <div class="modal-body pt-4 pb-2 text-center">
            <div id="confirm-status-icon" class="fs-1 mb-2"></div>
            <p id="confirm-status-msg" class="fw-semibold mb-0"></p>
            <p class="text-muted small" id="confirm-status-sub"></p>
          </div>
          <div class="modal-footer border-0 pt-0 justify-content-center gap-2">
            <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Cancel</button>
            <button type="button" id="btn-confirm-status" class="btn px-4">Confirm</button>
          </div>
        </div>
      </div>
    </div>

    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"></script>
    <script type="module" src="./students.js"></script>
  </body>
</html>
