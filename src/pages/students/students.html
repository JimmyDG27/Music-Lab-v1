<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Browse and manage students at Music Lab Academy. Search by name, sort, and view lesson history." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Students — Music Lab Academy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>

    <div class="ml-app">
      <div id="navbar-container"></div>

      <main class="ml-main">
        <div class="ml-content">

          <!-- Page header -->
          <div class="ml-page-header">
            <div>
              <h1>Students</h1>
              <p class="ml-page-subtitle" id="students-subtitle"></p>
            </div>
            <button id="btn-add-student" type="button" class="btn btn-primary d-none"
              data-bs-toggle="collapse" data-bs-target="#add-student-collapse" aria-expanded="false">
              <i class="bi bi-plus-lg me-1" aria-hidden="true"></i>Add Student
            </button>
          </div>

          <!-- Add Student inline form (Admin only) -->
          <div class="collapse" id="add-student-collapse">
            <div class="ml-inline-form mb-3">
              <p class="ml-inline-form-title">New Student</p>
              <form id="add-student-form" novalidate>
                <div class="row g-3">
                  <div class="col-sm-6">
                    <label class="form-label">First Name <span class="text-danger">*</span></label>
                    <input type="text" name="first_name" class="form-control form-control-sm" required />
                    <div class="invalid-feedback">Required.</div>
                  </div>
                  <div class="col-sm-6">
                    <label class="form-label">Last Name <span class="text-danger">*</span></label>
                    <input type="text" name="last_name" class="form-control form-control-sm" required />
                    <div class="invalid-feedback">Required.</div>
                  </div>
                  <div class="col-sm-6">
                    <label class="form-label">Phone</label>
                    <input type="tel" name="phone" class="form-control form-control-sm" />
                  </div>
                  <div class="col-sm-6">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control form-control-sm" />
                  </div>
                  <div class="col-sm-6">
                    <label class="form-label">Date of Birth</label>
                    <input type="date" name="birth_date" class="form-control form-control-sm" />
                  </div>
                  <div class="col-sm-6">
                    <label class="form-label">Primary Teacher</label>
                    <select name="primary_teacher_id" id="teacher-select" class="form-select form-select-sm">
                      <option value="">— None —</option>
                    </select>
                  </div>
                </div>
                <div id="form-error" class="alert alert-danger mt-3 d-none" role="alert"></div>
                <div class="d-flex gap-2 mt-3">
                  <button type="submit" id="btn-save-student" class="btn btn-primary btn-sm">
                    <span id="btn-save-spinner" class="spinner-border spinner-border-sm me-1 d-none" role="status" aria-hidden="true"></span>
                    Save Student
                  </button>
                  <button type="button" id="btn-cancel-add-student" class="btn btn-light btn-sm">Cancel</button>
                </div>
              </form>
            </div>
          </div>

          <!-- Edit Student inline form (Admin only) -->
          <div class="collapse" id="edit-student-collapse">
            <div class="ml-inline-form mb-3">
              <p class="ml-inline-form-title" id="edit-student-title">Edit Student</p>
              <form id="edit-student-form" novalidate>
                <input type="hidden" name="student_id" id="edit-student-id" />
                <input type="hidden" id="edit-original-teacher" name="original_teacher_id" />
                <div class="row g-3">
                  <div class="col-sm-6">
                    <label class="form-label">First Name <span class="text-danger">*</span></label>
                    <input type="text" name="first_name" id="edit-first-name" class="form-control form-control-sm" required />
                    <div class="invalid-feedback">Required.</div>
                  </div>
                  <div class="col-sm-6">
                    <label class="form-label">Last Name <span class="text-danger">*</span></label>
                    <input type="text" name="last_name" id="edit-last-name" class="form-control form-control-sm" required />
                    <div class="invalid-feedback">Required.</div>
                  </div>
                  <div class="col-sm-6">
                    <label class="form-label">Phone</label>
                    <input type="tel" name="phone" id="edit-phone" class="form-control form-control-sm" />
                  </div>
                  <div class="col-sm-6">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" id="edit-email" class="form-control form-control-sm" />
                  </div>
                  <div class="col-sm-6">
                    <label class="form-label">Date of Birth</label>
                    <input type="date" name="birth_date" id="edit-birth-date" class="form-control form-control-sm" />
                  </div>
                  <div class="col-sm-6">
                    <label class="form-label">Status</label>
                    <select name="is_active" id="edit-is-active" class="form-select form-select-sm">
                      <option value="true">Active</option>
                      <option value="false">Inactive</option>
                    </select>
                  </div>
                  <div class="col-12">
                    <label class="form-label">Primary Teacher</label>
                    <select name="primary_teacher_id" id="edit-teacher-select" class="form-select form-select-sm">
                      <option value="">— None —</option>
                    </select>
                  </div>
                </div>
                <div id="edit-form-error" class="alert alert-danger mt-3 d-none" role="alert"></div>
                <div class="d-flex gap-2 mt-3">
                  <button type="submit" id="btn-update-student" class="btn btn-primary btn-sm">
                    <span id="btn-update-spinner" class="spinner-border spinner-border-sm me-1 d-none" role="status" aria-hidden="true"></span>
                    Save Changes
                  </button>
                  <button type="button" id="btn-cancel-edit-student" class="btn btn-light btn-sm">Cancel</button>
                </div>
              </form>
            </div>
          </div>

          <!-- Search + Sort toolbar -->
          <div class="ml-toolbar">
            <div class="ml-search-wrap">
              <i class="bi bi-search ml-search-icon" aria-hidden="true"></i>
              <input type="text" id="search-input" class="form-control"
                placeholder="Search by name…" aria-label="Search students" />
            </div>
            <div id="sort-wrapper" class="d-none">
              <div class="dropdown">
                <button class="ml-sort-btn dropdown-toggle" type="button"
                        id="sort-dropdown-btn" data-bs-toggle="dropdown" aria-expanded="false">
                  <i class="bi bi-sort-alpha-down" aria-hidden="true"></i>
                  <span id="sort-label">A → Z</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end ml-sort-menu" aria-labelledby="sort-dropdown-btn">
                  <li><button class="dropdown-item active" data-sort="az">A → Z</button></li>
                  <li><button class="dropdown-item" data-sort="za">Z → A</button></li>
                  <li><button class="dropdown-item" data-sort="newest">Latest Added</button></li>
                  <li id="sort-by-teacher-li"><button class="dropdown-item" data-sort="teacher">Teacher (A → Z)</button></li>
                </ul>
              </div>
            </div>
          </div>

          <!-- Loading -->
          <div id="page-loading" class="d-flex justify-content-center align-items-center" style="min-height:200px;">
            <div class="spinner-border text-primary" role="status" style="width:1.75rem;height:1.75rem;border-width:.2em;">
              <span class="visually-hidden">Loading…</span>
            </div>
          </div>

          <!-- Content -->
          <div id="students-content" class="d-none">
            <div class="card">
              <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                  <thead>
                    <tr>
                      <th scope="col">Name</th>
                      <th scope="col" class="d-none d-md-table-cell">Primary Teacher</th>
                      <th scope="col" class="d-none d-sm-table-cell">Last Lesson</th>
                      <th scope="col">Status</th>
                      <th scope="col" style="width:48px"></th>
                    </tr>
                  </thead>
                  <tbody id="students-tbody"></tbody>
                </table>
              </div>
            </div>

            <!-- Empty state -->
            <div id="empty-state" class="d-none ml-empty-state">
              <div class="ml-empty-icon" aria-hidden="true">
                <i class="bi bi-people"></i>
              </div>
              <p class="ml-empty-title">No students found</p>
              <p class="ml-empty-desc">Try adjusting your search or filters.</p>
            </div>
          </div>

        </div>
      </main>
    </div>

    <!-- Status confirmation modal -->
    <div class="modal fade" id="confirmStatusModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-body">
            <div id="confirm-status-icon" class="fs-1 mb-2 text-center"></div>
            <p id="confirm-status-msg" class="fw-semibold mb-0 text-center"></p>
            <p class="text-muted small text-center" id="confirm-status-sub"></p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Cancel</button>
            <button type="button" id="btn-confirm-status" class="btn px-4">Confirm</button>
          </div>
        </div>
      </div>
    </div>

    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script type="module" src="./students.js"></script>
  </body>
</html>
