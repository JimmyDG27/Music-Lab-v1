<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Students — Music Lab</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <nav id="navbar-placeholder"></nav>

    <main class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h4 fw-semibold mb-0"><i class="bi bi-people me-2"></i>Students</h2>
        <button id="btn-add-student" class="btn btn-primary btn-sm d-none">
          <i class="bi bi-plus-lg me-1"></i>Add Student
        </button>
      </div>

      <div class="table-responsive">
        <table class="table table-hover align-middle" id="students-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Primary Teacher</th>
              <th>Last Lesson</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="students-tbody">
            <!-- Rows rendered by students.js -->
          </tbody>
        </table>
      </div>
    </main>

    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmSXFaoSV9G0rB2r1JFZbRMvCLQ"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="./students.js"></script>
  </body>
</html>
