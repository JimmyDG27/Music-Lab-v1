<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile — Music Lab</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>

    <div class="ml-app">
      <div id="navbar-container"></div>

      <div class="ml-main">
        <div class="ml-content" style="max-width:640px">

          <!-- Page header -->
          <div class="mb-4">
            <h1 class="h3 fw-bold mb-0">My Profile</h1>
            <p class="text-muted small mb-0">Update your personal information and password.</p>
          </div>

          <!-- Loading -->
          <div id="page-loading" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading…</span>
            </div>
          </div>

          <!-- Content -->
          <div id="profile-content" class="d-none d-flex flex-column gap-4">

            <!-- Avatar + name header -->
            <div class="card border-0 shadow-sm">
              <div class="card-body p-4 d-flex align-items-center gap-4">
                <div id="profile-avatar"
                     class="rounded-circle d-flex align-items-center justify-content-center fw-bold text-white flex-shrink-0"
                     style="width:64px;height:64px;font-size:1.4rem"></div>
                <div>
                  <div class="fw-semibold fs-5" id="profile-fullname"></div>
                  <span id="profile-role-badge" class="ml-badge"></span>
                </div>
              </div>
            </div>

            <!-- Profile info form -->
            <div class="card border-0 shadow-sm">
              <div class="card-body p-4">
                <h6 class="fw-semibold mb-3">
                  <i class="bi bi-person me-2 text-muted"></i>Personal Information
                </h6>
                <form id="profile-form" novalidate>
                  <div class="row g-3">
                    <div class="col-sm-6">
                      <label class="form-label">First Name <span class="text-danger">*</span></label>
                      <input type="text" id="profile-first-name" name="first_name"
                        class="form-control" required />
                      <div class="invalid-feedback">First name is required.</div>
                    </div>
                    <div class="col-sm-6">
                      <label class="form-label">Last Name <span class="text-danger">*</span></label>
                      <input type="text" id="profile-last-name" name="last_name"
                        class="form-control" required />
                      <div class="invalid-feedback">Last name is required.</div>
                    </div>
                    <div class="col-sm-6">
                      <label class="form-label">Phone</label>
                      <input type="tel" id="profile-phone" name="phone" class="form-control" />
                    </div>
                    <div class="col-sm-6">
                      <label class="form-label">Date of Birth</label>
                      <input type="date" id="profile-birth-date" name="birth_date" class="form-control" />
                    </div>
                    <div class="col-12">
                      <label class="form-label"><i class="bi bi-instagram me-1"></i>Instagram</label>
                      <input type="url" id="profile-instagram" name="instagram"
                        class="form-control" placeholder="https://instagram.com/username" />
                    </div>

                  </div>

                  <div id="profile-form-error" class="alert alert-danger mt-3 py-2 d-none"></div>

                  <div class="d-flex gap-2 mt-3">
                    <button type="submit" id="btn-save-profile" class="btn btn-primary">
                      <span id="btn-save-spinner" class="spinner-border spinner-border-sm me-1 d-none"></span>
                      Save Changes
                    </button>
                  </div>
                </form>
              </div>
            </div>

            <!-- Change password trigger -->
            <div class="card border-0 shadow-sm">
              <div class="card-body p-4 d-flex align-items-center justify-content-between">
                <div>
                  <div class="fw-semibold"><i class="bi bi-key me-2 text-muted"></i>Password</div>
                  <div class="text-muted small mt-1">Change your login password.</div>
                </div>
                <button type="button" class="btn btn-outline-secondary btn-sm"
                  data-bs-toggle="modal" data-bs-target="#change-password-modal">
                  Change Password
                </button>
              </div>
            </div>

          </div><!-- /profile-content -->

        </div>
      </div>
    </div>

    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <!-- Change Password Modal -->
    <div class="modal fade" id="change-password-modal" tabindex="-1"
         aria-labelledby="changePwModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered" style="max-width:420px">
        <div class="modal-content">
          <div class="modal-header border-0 pb-0">
            <h5 class="modal-title fw-semibold" id="changePwModalLabel">
              <i class="bi bi-key me-2 text-muted"></i>Change Password
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body pt-3">
            <form id="password-form" novalidate>
              <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" id="new-password" name="password"
                  class="form-control" minlength="8" required
                  autocomplete="new-password" />
                <div class="invalid-feedback">Minimum 8 characters.</div>
              </div>
              <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm"
                  class="form-control" required
                  autocomplete="new-password" />
                <div class="invalid-feedback" id="confirm-feedback">Passwords must match.</div>
              </div>
              <div id="password-form-error" class="alert alert-danger py-2 d-none"></div>
            </form>
          </div>
          <div class="modal-footer border-0 pt-0">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
            <button type="button" id="btn-change-password" class="btn btn-primary">
              <span id="btn-pw-spinner" class="spinner-border spinner-border-sm me-1 d-none"></span>
              Update Password
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script type="module" src="./profile.js"></script>
  </body>
</html>
