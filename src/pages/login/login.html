<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Вход — Music Lab Academy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background:
          radial-gradient(ellipse 80% 60% at 50% -10%, rgba(79,70,229,.45) 0%, transparent 70%),
          radial-gradient(ellipse 60% 40% at 80% 80%, rgba(168,85,247,.25) 0%, transparent 60%),
          #0d0d1a;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
        color: #fff;
      }

      /* ── Brand ── */
      .brand {
        display: flex;
        align-items: center;
        gap: .6rem;
        text-decoration: none;
        color: #fff;
        font-size: 1.1rem;
        font-weight: 700;
        margin-bottom: 2rem;
      }
      .brand-icon {
        width: 40px; height: 40px;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        font-size: 1rem;
      }

      /* ── Card ── */
      .login-card {
        width: 100%;
        max-width: 420px;
        background: rgba(255,255,255,.05);
        border: 1px solid rgba(255,255,255,.1);
        border-radius: 20px;
        padding: 2.5rem 2rem;
        backdrop-filter: blur(12px);
      }

      .login-card h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: .4rem;
      }
      .login-card .subtitle {
        color: #94a3b8;
        font-size: .9rem;
        margin-bottom: 2rem;
      }

      /* ── Form controls ── */
      .form-label {
        color: #cbd5e1;
        font-size: .85rem;
        font-weight: 500;
        margin-bottom: .4rem;
      }
      .form-control {
        background: rgba(255,255,255,.07) !important;
        border: 1px solid rgba(255,255,255,.15) !important;
        border-radius: 10px !important;
        color: #fff !important;
        padding: .7rem 1rem;
        font-size: .95rem;
        transition: border-color .2s, box-shadow .2s;
      }
      .form-control::placeholder { color: #475569; }
      .form-control:focus {
        border-color: rgba(99,102,241,.6) !important;
        box-shadow: 0 0 0 3px rgba(99,102,241,.2) !important;
        outline: none;
      }
      .form-control.is-invalid {
        border-color: rgba(239,68,68,.6) !important;
      }
      .invalid-feedback { color: #f87171; font-size: .8rem; }

      /* ── Submit button ── */
      .btn-login {
        width: 100%;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        border: none;
        border-radius: 10px;
        color: #fff;
        font-weight: 600;
        font-size: 1rem;
        padding: .8rem;
        cursor: pointer;
        transition: opacity .2s, transform .2s;
        box-shadow: 0 6px 24px rgba(79,70,229,.4);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: .5rem;
        margin-top: 1.5rem;
      }
      .btn-login:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
      .btn-login:disabled { opacity: .6; }

      /* ── Error alert ── */
      #login-error {
        background: rgba(239,68,68,.12);
        border: 1px solid rgba(239,68,68,.3);
        border-radius: 10px;
        color: #fca5a5;
        font-size: .88rem;
        padding: .75rem 1rem;
        margin-top: 1rem;
      }

      /* ── Back link ── */
      .back-link {
        margin-top: 1.75rem;
        font-size: .82rem;
        color: #64748b;
      }
      .back-link a { color: #818cf8; text-decoration: none; }
      .back-link a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>

    <a href="/" class="brand">
      <div class="brand-icon"><i class="bi bi-music-note-beamed text-white"></i></div>
      Music Lab Academy
    </a>

    <div class="login-card">
      <h1>Добре дошъл</h1>
      <p class="subtitle">Влез в своя акаунт, за да продължиш.</p>

      <form id="login-form" novalidate>
        <div class="mb-3">
          <label for="email" class="form-label">Имейл адрес</label>
          <input type="email" class="form-control" id="email" name="email"
            autocomplete="email" required placeholder="name@example.com" />
          <div class="invalid-feedback">Въведи валиден имейл.</div>
        </div>

        <div class="mb-1">
          <label for="password" class="form-label">Парола</label>
          <input type="password" class="form-control" id="password" name="password"
            autocomplete="current-password" required placeholder="••••••••" />
          <div class="invalid-feedback">Паролата е задължителна.</div>
        </div>

        <button type="submit" id="login-btn" class="btn-login">
          <i class="bi bi-box-arrow-in-right"></i> Влез
        </button>

        <div id="login-error" class="d-none" role="alert"></div>
      </form>
    </div>

    <p class="back-link">
      <a href="/"><i class="bi bi-arrow-left me-1"></i>Обратно към началната страница</a>
    </p>

    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script type="module" src="./login.js"></script>
  </body>
</html>
